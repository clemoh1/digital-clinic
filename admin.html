<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Pediatric Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Inter;
  background:#0d1117;
  color:white;
  margin:0;
  overflow-x:hidden;
}

/* Animated gradient background */
body::before{
  content:"";
  position:fixed;
  width:1200px;
  height:1200px;
  background:radial-gradient(circle,#00b4b322,transparent);
  top:-400px;
  left:-300px;
  animation:float 18s infinite linear;
  pointer-events:none;
}
body::after{
  content:"";
  position:fixed;
  width:900px;
  height:900px;
  background:radial-gradient(circle,#e8a84c22,transparent);
  bottom:-300px;
  right:-300px;
  animation:float2 20s infinite linear;
  pointer-events:none;
}
@keyframes float{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes float2{0%{transform:rotate(360deg)}100%{transform:rotate(0deg)}}

/* LOGIN */
.login{
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
  z-index: 1;
  position: relative;
}
.card{
  background:#161b22;
  padding:40px;
  border-radius:20px;
  width:350px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  animation:fadeUp .6s ease;
}
.card h2{font-family:Syne;margin-bottom:20px;}
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:16px;
  background:#0d1117;
  border:1px solid #333;
  color:white;
  border-radius:8px;
}
button{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}
.primary{background:#00b4b3;color:black;}

/* SIDEBAR & DASHBOARD */
.sidebar{
  position:fixed;
  width:250px;
  height:100%;
  background:#161b22;
  padding:20px;
  transition: transform .3s ease;
}
.sidebar h3{font-family:Syne;}
.nav{margin-top:30px;}
.nav button{
  display:block;
  width:100%;
  margin-bottom:10px;
  background:#1c2330;
  color:white;
  cursor:pointer;
  transition:.3s;
}
.nav button:hover{background:#00b4b3;color:black;}
.main{margin-left:260px;padding:30px;transition:.3s;}

/* Staff cards */
.staff-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
}
.staff{
  background:#161b22;
  border-radius:16px;
  overflow:hidden;
  transition:.3s;
  cursor:grab;
}
.staff:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 15px 40px rgba(0,0,0,.5);}
.staff img{width:100%;height:160px;object-fit:cover;transition:.3s;}
.staff-body{padding:16px;}
.role{color:#00b4b3;font-size:13px;}
.add{
  border:2px dashed #444;
  display:flex;
  align-items:center;
  justify-content:center;
  height:240px;
  cursor:pointer;
  transition:.3s;
}
.add:hover{border-color:#00b4b3;background:#00b4b311;}

/* Modal */
#addStaffModal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  align-items:center;
  justify-content:center;
  z-index: 10;
}
.modal-content{
  background:#161b22;
  padding:30px;
  border-radius:16px;
  width:350px;
}
.modal-content input{
  margin-bottom:12px;
  width:100%;
  padding:10px;
  background:#0d1117;
  border:1px solid #333;
  color:white;
  border-radius:8px;
}
.modal-content button{
  margin-top:10px;
  width:100%;
  padding:12px;
  background:#00b4b3;
  border:none;
  border-radius:8px;
  color:black;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}
.modal-content button:hover{background:#008b89;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{transform:translateX(-260px);position:fixed;}
  .sidebar.active{transform:translateX(0);}
  .main{margin-left:0;padding:20px;}
  .toggle-sidebar{
    position:fixed;
    top:20px;
    left:20px;
    background:#00b4b3;
    color:black;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    z-index:20;
  }
  .staff-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="card">
    <h2>Admin Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button class="primary" onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <button class="toggle-sidebar" onclick="toggleSidebar()">☰ Menu</button>
  <div class="sidebar" id="sidebar">
    <h3>🏥 Pediatric Clinic</h3>
    <div class="nav">
      <button onclick="view('consultations')">Consultations</button>
      <button onclick="view('staff')">Doctors & Staff</button>
      <button onclick="view('patientsite')">Patient Site</button>
    </div>
  </div>

  <div class="main">
    <div id="consultations">
      <h1>Consultations</h1>
      <p>Consultations from parents will appear here.</p>
    </div>

    <div id="staff" style="display:none">
      <h1>Doctors & Staff</h1>
      <div class="staff-grid" id="staffGrid"></div>
    </div>

    <div id="patientsite" style="display:none">
      <h1>Patient Site Preview</h1>
      <iframe src=index.html" width="100%" height="600"></iframe>
    </div>
  </div>
</div>

<!-- Add Staff Modal -->
<div id="addStaffModal">
  <div class="modal-content">
    <h3>Add Staff</h3>
    <input id="staffName" placeholder="Name">
    <input id="staffRole" placeholder="Role (Doctor/Nurse/Secretary)">
    <input id="staffSpecialty" placeholder="Specialty">
    <input id="staffPhoto" placeholder="Photo URL">
    <button onclick="submitStaff()">Save Staff</button>
  </div>
</div>

<script>
const USER="admin", PASS="1234";
let staff = JSON.parse(localStorage.getItem("clinic_staff") || "[]"), editIndex = null, draggedCard=null;

function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;
  if(u==USER && p==PASS){
    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadStaff();
  } else alert("Wrong login");
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

function view(v){
  document.getElementById("consultations").style.display="none";
  document.getElementById("staff").style.display="none";
  document.getElementById("patientsite").style.display="none";
  document.getElementById(v).style.display="block";
}

function loadStaff(){
  let grid=document.getElementById("staffGrid");
  grid.innerHTML="";
  staff.forEach((s,i)=>{
    let card=document.createElement("div");
    card.className="staff"; card.draggable=true;
    card.innerHTML=`
      <img src="${s.photo||'https://i.imgur.com/6VBx3io.png'}">
      <div class="staff-body">
        <h3>${s.name}</h3>
        <div class="role">${s.role}</div>
        <p>${s.specialty||""}</p>
        <button onclick="openEditStaff(${i})">Edit</button>
        <button onclick="deleteStaff(${i})">Delete</button>
      </div>
    `;
    card.addEventListener("dragstart",dragStart);
    card.addEventListener("dragover",dragOver);
    card.addEventListener("drop",dropCard);
    grid.appendChild(card);
  });
  let addBtn=document.createElement("div");
  addBtn.className="add"; addBtn.innerText="➕ Add Staff";
  addBtn.onclick=addStaff;
  grid.appendChild(addBtn);
}

// Drag & Drop
function dragStart(e){draggedCard=this;e.dataTransfer.effectAllowed="move";}
function dragOver(e){e.preventDefault(); e.dataTransfer.dropEffect="move";}
function dropCard(e){
  e.preventDefault();
  if(draggedCard && draggedCard!==this){
    let grid=draggedCard.parentNode;
    let children=Array.from(grid.children);
    let draggedIndex=children.indexOf(draggedCard);
    let dropIndex=children.indexOf(this);
    if(dropIndex>draggedIndex) grid.insertBefore(draggedCard,this.nextSibling);
    else grid.insertBefore(draggedCard,this);
    reorderStaff(grid);
  }
}
function reorderStaff(grid){
  let cards=Array.from(grid.children).filter(c=>c.classList.contains("staff"));
  staff=cards.map(c=>staff.find(s=>s.name===c.querySelector("h3").innerText));
  localStorage.setItem("clinic_staff",JSON.stringify(staff));
}

function addStaff(){
  editIndex=null;
  document.getElementById("staffName").value="";
  document.getElementById("staffRole").value="";
  document.getElementById("staffSpecialty").value="";
  document.getElementById("staffPhoto").value="";
  document.getElementById("addStaffModal").style.display="flex";
  document.getElementById("staffName").focus();
}
function openEditStaff(i){
  editIndex=i; let s=staff[i];
  document.getElementById("staffName").value=s.name;
  document.getElementById("staffRole").value=s.role;
  document.getElementById("staffSpecialty").value=s.specialty;
  document.getElementById("staffPhoto").value=s.photo;
  document.getElementById("addStaffModal").style.display="flex";
  document.getElementById("staffName").focus();
}
document.getElementById("addStaffModal").addEventListener("click",e=>{
  if(e.target===document.getElementById("addStaffModal")) e.target.style.display="none";
});
function submitStaff(){
  let name=document.getElementById("staffName").value.trim();
  let role=document.getElementById("staffRole").value.trim();
  let specialty=document.getElementById("staffSpecialty").value.trim();
  let photo=document.getElementById("staffPhoto").value.trim();
  if(!name||!role){alert("Name and Role are required!"); return;}
  if(editIndex!==null){staff[editIndex]={name,role,specialty,photo};}
  else{staff.push({name,role,specialty,photo});}
  localStorage.setItem("clinic_staff",JSON.stringify(staff));
  loadStaff(); document.getElementById("addStaffModal").style.display="none"; editIndex=null;
}
function deleteStaff(i){if(confirm("Are you sure you want to delete this staff member?")){staff.splice(i,1);localStorage.setItem("clinic_staff",JSON.stringify(staff));loadStaff();}}

// Enter key navigation
const modalInputs=Array.from(document.querySelectorAll("#addStaffModal input"));
modalInputs.forEach((input,i)=>{input.addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();if(i<modalInputs.length-1) modalInputs[i+1].focus(); else submitStaff();}})});
</script>

</body>
</html>
